function useTimeAgo() {
  const [now, setNow] = useState(new Date());
  useEffect(() => {
    const id = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(id);
  }, []);
  return now;
}

function pulseClass() {
  return "before:absolute before:inset-0 before:rounded-full before:bg-red-500 before:animate-ping before:opacity-75";

  return (
    <sup className="font-mono-d text-[9px] text-yellow-300/90">
      {arr.map((num, i) => (
        <React.Fragment key={num}>
          {i > 0 && <span className="text-stone-600">,</span>}
          <a
            href={`#source-${num}`}
            className="hover:text-yellow-200 ml-0.5 underline decoration-dotted underline-offset-2"
          >
            [{num}]
          </a>
        </React.Fragment>
      ))}
    </sup>
  );
}

                  <span className="text-stone-200 flex-1 min-w-[200px]">
                    {s.label}
                  </span>
                  <span className="font-mono-d text-[10px] uppercase tracking-wider text-stone-500">
                    {s.org}
                  </span>
                  <span className="font-mono-d text-[10px] text-stone-600">
                    {s.date}
                  </span>
                  <a
                    href={s.url}
                    target="_blank"
                    rel="noopener noreferrer"
                    className="font-mono-d text-[10px] uppercase tracking-wider text-stone-500 hover:text-yellow-300 flex items-center gap-1"
                  >
                    Verify <ExternalLink size={10} />
                  </a>
                </div>
              </li>
            ))}
          </ol>
          </details>
        </div>
      </section>

            {/* DESKTOP 3-COL GRID: Math + Timeline + Journey */}
      <div className="lg:grid lg:grid-cols-3 lg:gap-0 lg:divide-x lg:divide-stone-800">
{/* COALITION MATH */}
      <section id="math" className="border-b border-stone-800 py-20 md:py-28">
        <div className="max-w-7xl mx-auto px-6">
          <details open className="group">
          <summary className="cursor-pointer list-none mb-12">
            <p className="font-mono-d text-xs uppercase tracking-[0.3em] text-red-500 mb-3 flex items-center gap-2">
              <span className="inline-block transition-transform group-open:rotate-90">▶</span>
              §03 / {t.math_sub}
            </p>
            <h2 className={`${lang === "ta" ? "font-tamil" : "font-display"} text-5xl md:text-7xl lg:text-3xl xl:text-5xl mb-2`}>
              {t.math_title}
            </h2>
          </summary>

          <div className="grid md:grid-cols-3 lg:grid-cols-1 xl:grid-cols-3 gap-6 md:gap-8">
            {/* Target */}
            <div className="border border-stone-800 p-8 hover:border-yellow-300 transition">
              <p className="font-mono-d text-[10px] uppercase tracking-[0.25em] text-stone-500 mb-4">
                {t.math_target}
              </p>
              <p className="font-display text-5xl md:text-6xl lg:text-4xl xl:text-5xl whitespace-nowrap text-stone-100">{TARGET}</p>
              <p className="font-mono-d text-xs text-stone-500 mt-2">/ 234 seats</p>
            </div>
            {/* Confirmed */}
            <div className="border border-yellow-300 bg-yellow-300/5 p-8">
              <p className="font-mono-d text-[10px] uppercase tracking-[0.25em] text-yellow-300 mb-4 flex items-center gap-1">
                <CheckCircle2 size={12} /> {t.math_have}
              </p>
              <p className="font-display text-5xl md:text-6xl lg:text-4xl xl:text-5xl whitespace-nowrap text-yellow-300">
                {confirmedSeats}
              </p>
              <p className="font-mono-d text-xs text-stone-400 mt-2">
                {CONFIRMED.map((p) => `${p.party} ${p.seats}`).join(" + ")}
              </p>
            </div>
            {/* Delta */}
            <div
              className={`border p-8 ${
                delta >= 0
                  ? "border-green-500/60 bg-green-500/5"
                  : "border-red-500/60 bg-red-500/5"
              }`}
            >
              <p
                className={`font-mono-d text-[10px] uppercase tracking-[0.25em] mb-4 ${
                  delta >= 0 ? "text-green-400" : "text-red-400"
                }`}
              >
                {delta >= 0 ? t.math_safe : t.math_short}
              </p>
              <p
                className={`font-display text-5xl md:text-6xl lg:text-4xl xl:text-5xl whitespace-nowrap ${
                  delta >= 0 ? "text-green-400" : "text-red-400"
                }`}
              >
                {delta >= 0 ? "+" : ""}
                {delta}
              </p>
              <p className="font-mono-d text-xs text-stone-500 mt-2">
                {delta >= 0 ? "majority secured" : "MLAs needed"}
              </p>
            </div>
          </div>

          {/* Three (or two) honest buckets */}
          <div className={`mt-12 grid ${IN_TALKS.length > 0 ? "md:grid-cols-3" : "md:grid-cols-2"} gap-px bg-stone-800 border border-stone-800`}>
            {/* Confirmed */}
            <div className="bg-black p-6">
              <div className="flex items-center justify-between mb-4">
                <p className="font-mono-d text-[10px] uppercase tracking-[0.25em] text-yellow-300 flex items-center gap-1.5">
                  <CheckCircle2 size={11} /> {t.math_confirmed}
                </p>
                <span className="font-display text-2xl text-yellow-300">{confirmedSeats}</span>
              </div>
              <ul className="space-y-2">
                {CONFIRMED.map((p) => (
                  <li key={p.party} className="flex items-center justify-between text-sm">
                    <span className="flex items-center gap-2">
                      <span className="w-2 h-2 inline-block" style={{ backgroundColor: p.color }} />
                      {p.party}
                      <Cite n={p.source} />
                    </span>
                    <span className="font-mono-d text-stone-300">{p.seats}</span>
                  </li>
                ))}
              </ul>
            </div>

            {/* In talks (hidden when empty — coalition fully confirmed) */}
            {IN_TALKS.length > 0 && (
              <div className="bg-black p-6">
                <div className="flex items-center justify-between mb-4">
                  <p className="font-mono-d text-[10px] uppercase tracking-[0.25em] text-stone-300 flex items-center gap-1.5">
                    <AlertCircle size={11} /> {t.math_in_talks}
                  </p>
                  <span className="font-display text-2xl text-stone-300">{inTalksSeats}</span>
                </div>
                <ul className="space-y-2">
                  {IN_TALKS.map((p) => (
                    <li key={p.party} className="flex items-center justify-between text-sm">
                      <span className="flex items-center gap-2">
                        <span className="w-2 h-2 inline-block opacity-50" style={{ backgroundColor: p.color }} />
                        <span className="text-stone-400">{p.party}</span>
                        <Cite n={p.source} />
                      </span>
                      <span className="font-mono-d text-stone-500">{p.seats}</span>
                    </li>
                  ))}
                </ul>
                <p className="font-mono-d text-[10px] text-stone-600 mt-4 leading-relaxed">
                  {t.math_in_talks_note}
                </p>
              </div>
            )}

            {/* Opposition */}
            <div className="bg-black p-6">
              <div className="flex items-center justify-between mb-4">
                <p className="font-mono-d text-[10px] uppercase tracking-[0.25em] text-stone-500">
                  {t.math_opposition}
                </p>
                <span className="font-display text-2xl text-stone-500">{oppositionSeats}</span>
              </div>
              <ul className="space-y-2">
                {OPPOSITION.map((p) => (
                  <li key={p.party} className="flex items-center justify-between text-sm">
                    <span className="flex items-center gap-2">
                      <span className="w-2 h-2 inline-block opacity-50" style={{ backgroundColor: p.color }} />
                      <span className="text-stone-500">{p.party}</span>
                    </span>
                    <span className="font-mono-d text-stone-600">{p.seats}</span>
                  </li>
                ))}
              </ul>
            </div>
          </div>

          {/* Stacked progress: confirmed vs target, with in-talks ghosted */}
          <div className="mt-10">
            <p className="font-mono-d text-[10px] uppercase tracking-[0.25em] text-stone-500 mb-4">
              Progress to 118
            </p>
            <div className="h-12 flex border border-stone-800 overflow-hidden bg-stone-950 relative">
              {CONFIRMED.map((p) => (
                <div
                  key={p.party}
                  className="flex items-center justify-center border-r border-black"
                  style={{
                    width: `${(p.seats / TARGET) * 100}%`,
                    backgroundColor: p.color,
                  }}
                  title={`${p.party}: ${p.seats} (confirmed)`}
                >
                  <span className="font-mono-d text-[10px] text-black font-bold">
                    {p.seats > 4 ? `${p.party} ${p.seats}` : p.seats}
                  </span>
                </div>
              ))}
              {IN_TALKS.map((p) => (
                <div
                  key={p.party}
                  className="flex items-center justify-center border-r border-black"
                  style={{
                    width: `${(p.seats / TARGET) * 100}%`,
                    background: `repeating-linear-gradient(45deg, ${p.color}40, ${p.color}40 4px, transparent 4px, transparent 8px)`,
                  }}
                  title={`${p.party}: ${p.seats} (in talks — not confirmed)`}
                >
                  <span className="font-mono-d text-[10px] text-stone-300">
                    {p.party}?
                  </span>
                </div>
              ))}
            </div>
            <div className="flex flex-wrap items-center gap-4 font-mono-d text-[10px] text-stone-500 mt-3">
              <span className="flex items-center gap-1.5">
                <span className="w-3 h-3 bg-yellow-300 inline-block" />
                Confirmed
              </span>
              {IN_TALKS.length > 0 && (
                <>
                  <span className="flex items-center gap-1.5">
                    <span
                      className="w-3 h-3 inline-block"
                      style={{
                        background:
                          "repeating-linear-gradient(45deg, #FCD34D40, #FCD34D40 2px, transparent 2px, transparent 4px)",
                      }}
                    />
                    In talks (uncommitted)
                  </span>
                  <span className="text-yellow-300 ml-auto">
                    If all in-talks join: {confirmedSeats + inTalksSeats}{" "}
                    ({potentialDelta >= 0 ? `+${potentialDelta}` : potentialDelta})
                  </span>
                </>
              )}
            </div>
          </div>

          {/* Full house */}
          <div className="mt-16">
            <p className="font-mono-d text-[10px] uppercase tracking-[0.25em] text-stone-500 mb-4">
              {t.seat_chart_title} <Cite n={1} />
            </p>
            <div className="h-8 flex border border-stone-800 overflow-hidden">
              {FULL_HOUSE.map((p) => (
                <div
                  key={p.party}
                  className="border-r border-black last:border-r-0"
                  style={{
                    width: `${(p.seats / 234) * 100}%`,
                    backgroundColor: p.color,
                  }}
                  title={`${p.party}: ${p.seats}`}
                />
              ))}
            </div>
            <div className="flex flex-wrap gap-x-5 gap-y-2 mt-3 font-mono-d text-[10px] uppercase">
              {FULL_HOUSE.map((p) => (
                <span key={p.party} className="flex items-center gap-1.5">
                  <span
                    className="w-2 h-2 inline-block"
                    style={{ backgroundColor: p.color }}
                  />
                  {p.party} {p.seats}
                </span>
              ))}
            </div>
          </div>
          </details>
        </div>
      </section>

      {/* TIMELINE */}
      <section id="timeline" className="border-b border-stone-800 py-20 md:py-28 bg-stone-950">
        <div className="max-w-7xl mx-auto px-6">
          <details open className="group">
          <summary className="cursor-pointer list-none mb-12">
            <p className="font-mono-d text-xs uppercase tracking-[0.3em] text-red-500 mb-3 flex items-center gap-2">
              <span className="inline-block transition-transform group-open:rotate-90">▶</span>
              §04
            </p>
            <h2 className={`${lang === "ta" ? "font-tamil" : "font-display"} text-5xl md:text-7xl lg:text-3xl xl:text-5xl`}>
              {t.timeline_title}
            </h2>
          </summary>

          <div className="relative">
            <div className="absolute left-3 md:left-4 top-2 bottom-2 w-px bg-stone-800" />
            <div className="space-y-8">
              {TIMELINE.map((ev, i) => (
                <div key={i} className="relative flex gap-6 md:gap-8 pl-2">
                  <div className="relative z-10 mt-1.5">
                    <div className="w-3 h-3 md:w-4 md:h-4 rounded-full bg-red-500 ring-4 ring-stone-950" />
                  </div>
                  <div className="flex-1 grid md:grid-cols-[160px_1fr] gap-2 md:gap-8 pb-2 border-b border-stone-900">
                    <div className="font-mono-d text-xs uppercase tracking-wider text-stone-500">
                      {ev.date}
                    </div>
                    <div>
                      <h3 className="font-display text-xl mb-1">
                        {ev.title} <Cite n={ev.sources} />
                      </h3>
                      <p className="text-stone-400 text-sm leading-relaxed">{ev.body}</p>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
          </details>
        </div>
      </section>

      {/* JOURNEY */}
      <section id="journey" className="border-b border-stone-800 py-20 md:py-28">
        <div className="max-w-7xl mx-auto px-6">
          <details open className="group/section">
          <summary className="cursor-pointer list-none mb-12">
            <p className="font-mono-d text-xs uppercase tracking-[0.3em] text-red-500 mb-3 flex items-center gap-2">
              <span className="inline-block transition-transform group-open/section:rotate-90">▶</span>
              §05 / {t.journey_sub}
            </p>
            <h2 className={`${lang === "ta" ? "font-tamil" : "font-serif-d"} text-5xl md:text-7xl lg:text-3xl xl:text-5xl italic`}>
              {t.journey_title}
            </h2>
          </summary>

          <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-2 xl:grid-cols-3 gap-px bg-stone-800">
            {JOURNEY.map((step, i) => (
              <div
                key={i}
                className="bg-black p-6 hover:bg-stone-900 transition group"
              >
                <p className="font-mono-d text-[10px] uppercase tracking-[0.25em] text-yellow-300 mb-3">
                  Step {String(i + 1).padStart(2, "0")}
                </p>
                <p className="font-display text-2xl md:text-3xl lg:text-xl xl:text-2xl mb-3 group-hover:text-yellow-300 transition">
                  {step.year}
                </p>
                <p className="text-xs text-stone-400 leading-relaxed">{step.note}</p>
              </div>
            ))}
          </div>
          </details>
        </div>
      </section>

            </div>

      {/* ABOUT */}
      <section id="about" className="border-b border-stone-800 py-16 md:py-20 bg-stone-950">
        <div className="max-w-4xl mx-auto px-6">
          <details open className="group">
          <summary className="cursor-pointer list-none mb-8">
            <p className="font-mono-d text-xs uppercase tracking-[0.3em] text-red-500 mb-3 flex items-center gap-2">
              <span className="inline-block transition-transform group-open:rotate-90">▶</span>
              {t.about_label}
            </p>
            <h2 className={`${lang === "ta" ? "font-tamil" : "font-display"} text-4xl md:text-5xl`}>
              {t.about_title}
            </h2>
          </summary>
          <div className={`${lang === "ta" ? "font-tamil" : ""} space-y-5 text-stone-300 text-base md:text-lg leading-relaxed max-w-3xl`}>
            <p>{t.about_body_1}</p>
            <p>{t.about_body_2}</p>
            <p className={`${lang === "ta" ? "font-tamil" : "font-serif-d italic"} text-sm text-stone-500 mt-8`}>
              {t.in_the_news}{" "}
              <a
                href="https://www.dinamalar.com/world-news-nri-en/united-states/news/-cm-website-launched/2910"
                target="_blank"
                rel="noopener noreferrer"
                className="text-stone-400 hover:text-yellow-300 underline decoration-dotted underline-offset-2"
              >
                Dinamalar (NRI News)
              </a>.
            </p>
          </div>
          </details>
        </div>
      </section>

{/* SHARE / FOOTER */}
      <footer className="py-16 md:py-20 bg-black">
        <div className="max-w-7xl mx-auto px-6">
          <div className="grid md:grid-cols-2 gap-12 mb-16">
            <div>
              <p className="font-display text-4xl md:text-5xl mb-4">
                Built for the moment.
              </p>
              <p className="text-stone-400 max-w-md leading-relaxed">
                Tamil Nadu just broke a 59-year political pattern. After tracking the formation of the new government, track what it delivers, day by day.
              </p>
            </div>
            <div className="flex flex-col gap-3 md:items-end">
              <button
                onClick={handleShare}
                className="bg-red-600 text-white font-mono-d text-sm uppercase tracking-wider px-6 py-4 hover:bg-red-500 transition flex items-center gap-2 self-start md:self-end"
              >
                <Share2 size={16} /> Share this site
              </button>
              <p className="font-mono-d text-xs text-stone-500">
                cmvijay.ai → WhatsApp, X, Telegram
              </p>
            </div>
          </div>

          <div className="border-t border-stone-900 pt-8 flex flex-col md:flex-row justify-between gap-6">
            <p className="text-xs text-stone-500 max-w-3xl leading-relaxed">
              {t.footer_disclaimer}{" "}
              <a href="mailto:feedback@cmvijay.ai" className="text-yellow-400 hover:text-yellow-300 underline">
                {t.footer_feedback}
              </a>.
            </p>
            <div className="font-mono-d text-[10px] uppercase tracking-[0.25em] text-stone-600 flex items-center gap-2">
              <svg width="18" height="12" viewBox="0 0 30 20" xmlns="http://www.w3.org/2000/svg" aria-label="Indian flag" className="inline-block">
                <rect width="30" height="6.67" y="0" fill="#FF9933" />
                <rect width="30" height="6.67" y="6.67" fill="#FFFFFF" />
                <rect width="30" height="6.67" y="13.33" fill="#138808" />
                {/* Ashoka Chakra: 24 spokes, navy blue */}
                <g transform="translate(15 10)">
                  <circle r="2.5" fill="none" stroke="#000080" strokeWidth="0.3" />
                  <circle r="0.4" fill="#000080" />
                  {Array.from({ length: 24 }).map((_, i) => (
                    <line
                      key={i}
                      x1="0"
                      y1="0"
                      x2="0"
                      y2="-2.5"
                      stroke="#000080"
                      strokeWidth="0.2"
                      transform={`rotate(${i * 15})`}
                    />
                  ))}
                </g>
              </svg>
              {t.footer_credit}
            </div>
          </div>
        </div>
      </footer>
    </div>
  );
}



import { createRoot } from "react-dom/client";
createRoot(document.getElementById("root")).render(<CMVijayAI />);
  </script>
